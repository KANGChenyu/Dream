services:
  # PostgreSQL 数据库（含 pgvector 扩展）
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dreamlog-postgres
    environment:
      POSTGRES_USER: dreamlog
      POSTGRES_PASSWORD: dreamlog123
      POSTGRES_DB: dreamlog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreamlog"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存 + 消息队列
  redis:
    image: redis:7-alpine
    container_name: dreamlog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # DreamLog 后端 API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dreamlog-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # 开发模式热重载
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  # Celery Worker（AI 异步任务）
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dreamlog-celery
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
  redis_data:
